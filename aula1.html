<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 01 Javascript</title>
    
</head>
<body>
    <center><h1>Javascript pode mudar o tamanho das palavras</h1>
    <p id="demo">A fonte desse texto vai mudar</p>
    <button onclick="document.getElementById('demo').style.fontSize='35px'" type="button">Clique aqui para mudar o tamanho do texto acima</button>
    <button onclick="document.getElementById('demo').style.color='blue'" type="button">Clique aqui para mudar a cor do texto acima</button>
     <button onclick="document.getElementById('demo').style.backgroundColor='black'" type="button">Clique aqui para mudar o fundo do texto acima</button>
        </center>
</body>

</html>
