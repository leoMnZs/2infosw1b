<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 02 Javascript</title>
    
</head>
<body>
    <center><h1>Display</h1>
    <p id="demo">Vou sumir</p>
    <button onclick="document.getElementById('demo').style.display = 'none'" type="button">Apagar o texto</button>
    <button onclick="document.getElementById('demo').style.display = 'block'" type="button">Farei o texto aparecer</button>
    </center>
</body>
</html>
